<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PyPad — GitLab Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg0:#0d0f14; --bg1:#13161e; --bg2:#1a1e29; --bg3:#222738; --bg4:#2a3045;
  --line:#2e3448; --muted:#4a5070; --dim:#6b7494; --fg:#c8d0e8; --fg-bright:#e8edf8;
  --accent:#7c9fff; --accent2:#a78bfa; --green:#5de0a0; --yellow:#f5c842;
  --orange:#ff9940; --red:#ff5f7e; --cyan:#42d4f4; --gl:#fc6d26;
  --token-kw:#a78bfa; --token-fn:#7c9fff; --token-str:#5de0a0; --token-num:#f5c842;
  --token-cmt:#4a5a7a; --token-dec:#ff9940; --token-cls:#42d4f4; --token-op:#c8d0e8;
  --gutter-w:42px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg0);color:var(--fg);font-family:'JetBrains Mono',monospace;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;line-height:1.6}

/* ── TITLE BAR ── */
.titlebar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--bg1);border-bottom:1px solid var(--line);
  gap:10px;flex-shrink:0;z-index:50}
.titlebar-left{display:flex;align-items:center;gap:10px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--fg-bright);letter-spacing:-.5px}
.logo span{color:var(--accent)}
.file-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);
  border:1px solid var(--line);border-radius:6px;padding:3px 10px;
  font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.file-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0}
.file-pill.clean .dot{background:var(--green)}
.titlebar-right{display:flex;align-items:center;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--line);
  background:var(--bg2);color:var(--dim);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0;position:relative}
.icon-btn:active{background:var(--bg4);color:var(--fg-bright);transform:scale(.93)}
.icon-btn.active{background:var(--bg3);color:var(--accent);border-color:var(--accent)}
.icon-btn.gl-active{color:var(--gl);border-color:var(--gl)}
.notif-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;
  border-radius:50%;background:var(--red);border:1px solid var(--bg2)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:4px;padding:6px 12px;
  background:var(--bg1);border-bottom:1px solid var(--line);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.toolbar::-webkit-scrollbar{display:none}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:5px;
  border:1px solid var(--line);background:var(--bg2);color:var(--dim);
  font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.tb-btn:active{background:var(--bg4);color:var(--fg-bright)}
.tb-btn.danger{border-color:rgba(255,95,126,.3);color:var(--red)}
.tb-btn.gl{border-color:rgba(252,109,38,.3);color:var(--gl)}
.tb-sep{width:1px;height:18px;background:var(--line);flex-shrink:0;margin:0 2px}

/* ── MAIN ── */
.main{flex:1;display:flex;overflow:hidden;position:relative}

/* ── EDITOR PANE ── */
.editor-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:4px 12px;
  font-size:10.5px;color:var(--muted);background:var(--bg1);border-bottom:1px solid var(--line);flex-shrink:0;overflow:hidden}
.breadcrumb span{color:var(--dim);white-space:nowrap}
.breadcrumb .crumb{color:var(--fg)}
.breadcrumb .gl-ref{color:var(--gl);margin-left:auto;font-size:10px;white-space:nowrap;flex-shrink:0}

/* ── CODE AREA ── */
.code-wrapper{flex:1;overflow:auto;position:relative;background:var(--bg0)}
.code-wrapper::-webkit-scrollbar{width:4px;height:4px}
.code-wrapper::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.code-container{display:flex;min-height:100%;padding-bottom:40px}
.gutter{width:var(--gutter-w);flex-shrink:0;padding:12px 0;text-align:right;font-size:11px;
  color:var(--muted);line-height:1.6;position:sticky;left:0;background:var(--bg0);
  border-right:1px solid var(--line);user-select:none}
.gutter-line{padding-right:10px;height:20.8px;display:flex;align-items:center;
  justify-content:flex-end;position:relative;cursor:pointer}
.gutter-line.has-error{color:var(--red)}
.gutter-line.has-warning{color:var(--yellow)}
.gutter-line.has-info{color:var(--cyan)}
.gutter-line .bp{width:8px;height:8px;border-radius:50%;background:transparent;margin-right:2px;flex-shrink:0}
.gutter-line .bp.active{background:var(--red);box-shadow:0 0 6px var(--red)}
.code-lines{flex:1;padding:12px 0 12px 14px;outline:none;position:relative;min-width:0;overflow-x:auto}
.code-line{height:20.8px;display:flex;align-items:center;white-space:pre;position:relative;padding-right:40px;border-radius:2px}
.code-line.active-line{background:rgba(124,159,255,.06)}
.code-line.error-line{background:rgba(255,95,126,.07);border-left:2px solid var(--red);padding-left:12px}
.code-line.warning-line{background:rgba(245,200,66,.06);border-left:2px solid var(--yellow);padding-left:12px}
.code-line.info-line{background:rgba(66,212,244,.05);border-left:2px solid var(--cyan);padding-left:12px}
.inline-diag{display:inline-flex;align-items:center;gap:5px;margin-left:18px;
  padding:1px 8px;border-radius:4px;font-size:10.5px;font-style:italic;vertical-align:middle;cursor:pointer}
.inline-diag.error{background:rgba(255,95,126,.1);color:#ff8fa6;border:1px solid rgba(255,95,126,.2)}
.inline-diag.warn{background:rgba(245,200,66,.1);color:var(--yellow);border:1px solid rgba(245,200,66,.2)}
.inline-diag.info{background:rgba(66,212,244,.08);color:var(--cyan);border:1px solid rgba(66,212,244,.2)}
.inline-diag .src{opacity:.6;font-size:9.5px}
.kw{color:var(--token-kw)} .fn{color:var(--token-fn)} .st{color:var(--token-str)}
.nu{color:var(--token-num)} .cm{color:var(--token-cmt);font-style:italic}
.dc{color:var(--token-dec)} .cl{color:var(--token-cls)} .op{color:var(--token-op)}
.pa{color:var(--dim)} .va{color:var(--fg)}

/* ── PROBLEMS PANEL ── */
.problems-panel{height:0;overflow:hidden;flex-shrink:0;border-top:1px solid transparent;
  background:var(--bg1);transition:height .2s ease,border-color .2s;display:flex;flex-direction:column}
.problems-panel.open{height:200px;border-color:var(--line)}
.panel-header{display:flex;align-items:center;gap:10px;padding:6px 14px;
  border-bottom:1px solid var(--line);flex-shrink:0;user-select:none}
.panel-title{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;color:var(--dim);
  letter-spacing:.5px;text-transform:uppercase;flex:1}
.badge{padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.badge.err{background:rgba(255,95,126,.15);color:var(--red)}
.badge.warn{background:rgba(245,200,66,.15);color:var(--yellow)}
.badge.info{background:rgba(66,212,244,.1);color:var(--cyan)}
.panel-close{font-size:12px;color:var(--muted);cursor:pointer;padding:2px}
.problems-list{overflow-y:auto;flex:1}
.problems-list::-webkit-scrollbar{width:3px}
.problems-list::-webkit-scrollbar-thumb{background:var(--bg4)}
.problem-item{display:flex;align-items:flex-start;gap:10px;padding:7px 14px;
  border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.problem-item:active{background:var(--bg3)}
.problem-icon{font-size:12px;flex-shrink:0;margin-top:1px}
.problem-icon.e{color:var(--red)} .problem-icon.w{color:var(--yellow)} .problem-icon.i{color:var(--cyan)}
.problem-content{flex:1;min-width:0}
.problem-msg{font-size:11.5px;color:var(--fg);line-height:1.4}
.problem-meta{display:flex;gap:10px;margin-top:2px;font-size:10px;color:var(--muted)}
.problem-meta .rule{color:var(--accent)}

/* ── SIDEBAR ── */
.sidebar{width:0;overflow:hidden;background:var(--bg1);border-left:0 solid var(--line);
  transition:width .2s ease,border-width .2s;flex-shrink:0;display:flex;flex-direction:column}
.sidebar.open{width:220px;border-left-width:1px}
.sidebar-scroll{overflow-y:auto;flex:1}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--bg4)}
.sidebar-section{padding:10px 14px}
.sidebar-header{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sidebar-header .sh-action{margin-left:auto;font-size:9px;color:var(--accent);cursor:pointer;
  font-weight:400;text-transform:none;letter-spacing:0}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:5px;
  cursor:pointer;font-size:11.5px;color:var(--dim);transition:all .1s}
.sidebar-item:active{background:var(--bg3);color:var(--fg)}
.sidebar-item.active-file{background:var(--bg3);color:var(--fg-bright)}
.sidebar-item .si-icon{font-size:13px;flex-shrink:0}
.sidebar-item .si-badge{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:8px;background:var(--bg4);color:var(--dim)}
.sidebar-sep{height:1px;background:var(--line);margin:4px 14px}
.ext-list{display:flex;flex-direction:column;gap:5px;padding:0 14px 10px}
.ext-badge{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;
  background:var(--bg2);border:1px solid var(--line);font-size:10.5px;color:var(--dim)}
.ext-badge .eb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ext-badge .eb-name{flex:1}

/* ── GITLAB PANEL (replaces sidebar content) ── */
.gl-user-card{margin:10px 14px;padding:10px 12px;background:var(--bg2);
  border:1px solid var(--line);border-radius:8px}
.gl-user-card .guc-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.gl-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gl),#e24329);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700;color:#fff}
.gl-user-info .gui-name{font-size:12px;color:var(--fg-bright);font-weight:600}
.gl-user-info .gui-email{font-size:10px;color:var(--muted)}
.gl-token-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
.gl-token-row .token-mask{color:var(--green);font-family:'JetBrains Mono',monospace}
.gl-signout{font-size:10px;color:var(--red);cursor:pointer;margin-left:auto}

/* ── STATUS BAR ── */
.statusbar{display:flex;align-items:center;padding:3px 12px;gap:12px;
  background:var(--bg1);border-top:1px solid var(--line);font-size:10px;
  color:var(--muted);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.statusbar::-webkit-scrollbar{display:none}
.status-item{display:flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer;transition:color .1s}
.status-item:active{color:var(--fg)}
.status-item .si-err{color:var(--red)} .status-item .si-warn{color:var(--yellow)}
.status-item.branch{color:var(--accent2)}
.status-item.python-ver{color:var(--green)}
.status-item.gl-status{color:var(--gl)}
.status-spacer{flex:1}

/* ── HOVER TIP ── */
.hover-tip{position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--bg4);
  border-radius:8px;padding:10px 12px;max-width:290px;font-size:11.5px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;opacity:0;transition:opacity .15s}
.hover-tip.visible{opacity:1}
.hover-tip .ht-kind{font-size:10px;color:var(--accent2);margin-bottom:4px;font-family:'Syne',sans-serif}
.hover-tip .ht-sig{color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:6px;font-size:11px}
.hover-tip .ht-doc{color:var(--dim);line-height:1.5;font-size:11px}
.hover-tip .ht-type{color:var(--cyan);font-size:10.5px;margin-top:4px}

/* ── SHEETS (bottom sheet system) ── */
.sheet-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);
  opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg1);
  border-radius:16px 16px 0 0;border-top:1px solid var(--bg4);
  transform:translateY(100%);transition:transform .25s ease;
  padding-bottom:env(safe-area-inset-bottom,16px);max-height:92dvh;
  display:flex;flex-direction:column}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:10px auto 14px;flex-shrink:0}
.sheet-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--fg-bright);
  padding:0 18px 4px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sheet-subtitle{padding:0 18px 12px;font-size:11px;color:var(--muted);flex-shrink:0}
.sheet-sep{height:1px;background:var(--line);margin:0 0 8px;flex-shrink:0}
.sheet-scroll{overflow-y:auto;flex:1}
.sheet-scroll::-webkit-scrollbar{width:3px}
.sheet-scroll::-webkit-scrollbar-thumb{background:var(--bg4)}

/* Fix items */
.fix-item{display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;transition:background .1s}
.fix-item:active{background:var(--bg3)}
.fix-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fix-icon.purple{background:rgba(167,139,250,.15)} .fix-icon.blue{background:rgba(124,159,255,.15)}
.fix-icon.green{background:rgba(93,224,160,.12)} .fix-icon.orange{background:rgba(255,153,64,.12)}
.fix-icon.gl-color{background:rgba(252,109,38,.12)}
.fix-text .ft-label{font-size:13px;color:var(--fg-bright);margin-bottom:2px}
.fix-text .ft-desc{font-size:11px;color:var(--muted)}

/* ── AUTH SHEET ── */
.auth-sheet .auth-header{padding:0 18px 16px;text-align:center}
.auth-sheet .auth-logo{font-size:32px;margin-bottom:8px}
.auth-sheet .auth-tagline{font-size:11px;color:var(--muted);line-height:1.5}
.auth-field{margin:0 18px 10px}
.auth-field label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;color:var(--fg-bright);font-family:'JetBrains Mono',monospace;
  font-size:12px;outline:none;transition:border-color .15s}
.auth-input:focus{border-color:var(--gl)}
.auth-input::placeholder{color:var(--muted)}
.auth-hint{font-size:10px;color:var(--muted);padding:0 18px 4px;line-height:1.5}
.auth-hint a{color:var(--accent);text-decoration:none}
.auth-btn{margin:12px 18px 6px;width:calc(100% - 36px);padding:12px;
  background:var(--gl);border:none;border-radius:10px;
  color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;transition:opacity .15s}
.auth-btn:active{opacity:.8}
.auth-btn:disabled{opacity:.4;cursor:not-allowed}
.auth-error{margin:0 18px 10px;padding:8px 12px;background:rgba(255,95,126,.1);
  border:1px solid rgba(255,95,126,.25);border-radius:7px;font-size:11px;color:var(--red);display:none}
.auth-error.show{display:block}

/* ── REPO BROWSER SHEET ── */
.repo-search{margin:0 18px 10px;position:relative}
.repo-search input{width:100%;background:var(--bg2);border:1px solid var(--line);
  border-radius:8px;padding:9px 12px 9px 32px;color:var(--fg);font-size:12px;
  font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.repo-search input:focus{border-color:var(--accent)}
.repo-search::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:14px;pointer-events:none}
.repo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;
  cursor:pointer;border-bottom:1px solid var(--line);transition:background .1s}
.repo-item:active{background:var(--bg3)}
.repo-icon{width:34px;height:34px;border-radius:8px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  border:1px solid var(--line)}
.repo-info .ri-name{font-size:12.5px;color:var(--fg-bright);margin-bottom:3px}
.repo-info .ri-meta{font-size:10.5px;color:var(--muted);display:flex;gap:8px}
.repo-info .ri-meta .vis{color:var(--accent2)}
.repo-info .ri-meta .lang{color:var(--green)}
.repo-info .ri-meta .updated{color:var(--dim)}
.repo-empty{padding:30px 18px;text-align:center;color:var(--muted);font-size:12px}

/* ── FILE TREE SHEET ── */
.tree-path-bar{display:flex;align-items:center;gap:6px;padding:0 18px 12px;
  font-size:11px;color:var(--muted);overflow-x:auto;scrollbar-width:none}
.tree-path-bar::-webkit-scrollbar{display:none}
.tree-crumb{cursor:pointer;color:var(--accent);white-space:nowrap}
.tree-crumb:last-child{color:var(--fg);cursor:default}
.tree-item{display:flex;align-items:center;gap:10px;padding:9px 18px;
  cursor:pointer;border-bottom:1px solid rgba(46,52,72,.5);transition:background .1s}
.tree-item:active{background:var(--bg3)}
.tree-item .ti-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.tree-item .ti-name{font-size:12px;color:var(--fg);flex:1}
.tree-item .ti-size{font-size:10px;color:var(--muted)}
.tree-item.dir .ti-name{color:var(--accent)}

/* ── COMMIT SHEET ── */
.commit-diff{margin:0 18px 12px;background:var(--bg0);border:1px solid var(--line);
  border-radius:8px;padding:10px 12px;font-size:11px;max-height:140px;overflow-y:auto}
.commit-diff::-webkit-scrollbar{width:3px}
.commit-diff::-webkit-scrollbar-thumb{background:var(--bg4)}
.diff-add{color:var(--green)} .diff-remove{color:var(--red)} .diff-meta{color:var(--muted)}
.commit-msg-wrap{margin:0 18px 10px}
.commit-msg-wrap label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.commit-msg{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;color:var(--fg-bright);font-family:'JetBrains Mono',monospace;
  font-size:12px;outline:none;resize:none;height:70px;transition:border-color .15s}
.commit-msg:focus{border-color:var(--green)}
.commit-branch-row{display:flex;align-items:center;gap:8px;padding:0 18px 12px;font-size:11px;color:var(--dim)}
.commit-branch-row strong{color:var(--accent2)}
.commit-btn{margin:0 18px 6px;width:calc(100% - 36px);padding:12px;
  background:var(--green);border:none;border-radius:10px;
  color:#0d0f14;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s}
.commit-btn:active{opacity:.8}

/* ── MR / ISSUES ── */
.mr-tabs{display:flex;border-bottom:1px solid var(--line);margin:0 18px 0;flex-shrink:0}
.mr-tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.mr-tab.active{color:var(--fg-bright);border-bottom-color:var(--accent)}
.mr-item{padding:12px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.mr-item:active{background:var(--bg3)}
.mr-item .mi-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mr-item .mi-title{font-size:12px;color:var(--fg-bright);flex:1}
.mr-badge{padding:1px 7px;border-radius:8px;font-size:9.5px;font-weight:600}
.mr-badge.open{background:rgba(93,224,160,.15);color:var(--green)}
.mr-badge.merged{background:rgba(167,139,250,.15);color:var(--accent2)}
.mr-badge.closed{background:rgba(255,95,126,.1);color:var(--red)}
.mr-badge.issue{background:rgba(66,212,244,.1);color:var(--cyan)}

  border-top-color:var(--gl);border-radius:50%;animation:spin .6s linear infinite}

  animation:blink 1.1s step-end infinite;vertical-align:text-bottom;margin-left:1px}

</head>
<body>

<!-- STATUS BAR -->

<!-- ══════════════════════════════════════════════════════════
     SHEET SYSTEM — one overlay, swappable inner content
     ══════════════════════════════════════════════════════════ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="maybeCloseSheet(event)">
  <div class="sheet" id="sheetBody">
    <div class="sheet-handle"></div>
    <div id="sheetContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  SESSION — in-memory only, never touches localStorage
// ══════════════════════════════════════════════════════
const session = {
  token: null,
  username: null,
  email: null,
  avatarInitial: null,
  gitlabUrl: 'https://gitlab.com',
  currentRepo: null,   // { id, name, fullPath, defaultBranch }
  currentFile: null,   // { path, content, sha }
  currentBranch: null,
  openFiles: [],
};

function isAuthed() { return !!session.token; }

function api(path, opts = {}) {
  const url = `${session.gitlabUrl}/api/v4${path}`;
  return fetch(url, {
    ...opts,
    headers: {
      'PRIVATE-TOKEN': session.token,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
}

// ══════════════════════════════════════════════════════
//  SHEET SYSTEM
// ══════════════════════════════════════════════════════
let sheetOpen = false;
function openSheet(html) {
  document.getElementById('sheetContent').innerHTML = html;
  document.getElementById('sheetOverlay').classList.add('open');
  sheetOpen = true;
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  sheetOpen = false;
}
function maybeCloseSheet(e) {
  if (e.target === document.getElementById('sheetOverlay')) closeSheet();
}

// ══════════════════════════════════════════════════════
//  GITLAB AUTH SHEET
// ══════════════════════════════════════════════════════
function openGitLabPanel() {
  if (isAuthed()) {
    openAuthedGLPanel();
  } else {
    openAuthSheet();
  }
}

function openAuthSheet() {
  openSheet(`
    <div class="auth-sheet">
      <div class="auth-header">
        <div class="auth-logo">⬡</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--fg-bright);margin-bottom:6px">
          Connect GitLab
        </div>
        <div class="auth-tagline">
          Token stored in-memory only — cleared on page refresh.<br>
          Never written to disk or localStorage.
        </div>
      </div>
      <div class="auth-error" id="authError"></div>
      <div class="auth-field">
        <label>GitLab Instance URL</label>
        <input class="auth-input" id="authUrl" type="url" value="https://gitlab.com" placeholder="https://gitlab.com"/>
      </div>
      <div class="auth-field">
        <label>Personal Access Token</label>
        <input class="auth-input" id="authToken" type="password" placeholder="glpat-xxxxxxxxxxxxxxxxxxxx" autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="auth-hint">
        Needs <strong style="color:var(--fg)">read_api</strong> + <strong style="color:var(--fg)">write_repository</strong> scopes.
        <a href="#" onclick="return false">How to create a token →</a>
      </div>
      <button class="auth-btn" id="authSubmit" onclick="submitAuth()">Connect</button>
      <div style="height:8px"></div>
    </div>
  `);
}

async function submitAuth() {
  const btn = document.getElementById('authSubmit');
  const err = document.getElementById('authError');
  const token = document.getElementById('authToken').value.trim();
  const url = document.getElementById('authUrl').value.trim().replace(/\/$/, '');
  err.classList.remove('show');

  if (!token) { err.textContent = 'Token is required.'; err.classList.add('show'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  session.gitlabUrl = url;
  session.token = token;

  try {
    const res = await api('/user');
    if (!res.ok) throw new Error(`HTTP ${res.status} — check your token and URL`);
    const user = await res.json();
    session.username = user.username;
    session.email = user.email || user.public_email || '(no public email)';
    session.avatarInitial = (user.name || user.username).charAt(0).toUpperCase();
    onAuthSuccess();
  } catch (e) {
    session.token = null;
    err.textContent = e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

function onAuthSuccess() {
  updateGLStatusBar();
  closeSheet();
  showToast(`⬡ Connected as @${session.username}`);
  // Update sidebar user card
  document.getElementById('glUserSlot').innerHTML = buildUserCard();
  document.getElementById('glExtStatus').textContent = '●';
  document.getElementById('glExtStatus').style.color = 'var(--gl)';
  document.getElementById('glBtn').classList.add('gl-active');
  document.getElementById('glDot').style.display = 'none';
}

function buildUserCard() {
  const mask = session.token ? session.token.slice(0,8) + '••••••••' : '';
  return `
    <div class="gl-user-card">
      <div class="guc-top">
        <div class="gl-avatar">${session.avatarInitial}</div>
        <div class="gl-user-info">
          <div class="gui-name">@${session.username}</div>
          <div class="gui-email">${session.email}</div>
        </div>
      </div>
      <div class="gl-token-row">
        <span>Token:</span>
        <span class="token-mask">${mask}</span>
        <span class="gl-signout" onclick="signOut()">Sign out</span>
      </div>
    </div>`;
}

function signOut() {
  session.token = null; session.username = null; session.email = null;
  session.avatarInitial = null; session.currentRepo = null; session.currentFile = null;
  document.getElementById('glUserSlot').innerHTML = '';
  document.getElementById('glExtStatus').textContent = '○';
  document.getElementById('glExtStatus').style.color = 'var(--muted)';
  document.getElementById('glBtn').classList.remove('gl-active');
  document.getElementById('statusGl').style.display = 'none';
  document.getElementById('statusBranch').textContent = '⎇ main';
  document.getElementById('breadRef').style.display = 'none';
  closeSheet();
  showToast('Signed out from GitLab');
}

function updateGLStatusBar() {
  const el = document.getElementById('statusGl');
  el.textContent = `⬡ @${session.username}`;
  el.style.display = 'flex';
}

function openAuthedGLPanel() {
  openSheet(`
    <div class="sheet-title">⬡ GitLab</div>
    <div class="sheet-subtitle">@${session.username} · ${session.gitlabUrl.replace('https://', '')}</div>
    <div class="sheet-sep"></div>
    <div class="sheet-scroll">
      <div class="fix-item" onclick="openRepoBrowser()">
        <div class="fix-icon gl-color">📂</div>
        <div class="fix-text"><div class="ft-label">Open Repository</div><div class="ft-desc">Browse and open a project</div></div>
      </div>
      <div class="fix-item" onclick="openCommitSheet()">
        <div class="fix-icon green">↑</div>
        <div class="fix-text"><div class="ft-label">Commit &amp; Push</div><div class="ft-desc">Stage current file and commit</div></div>
      </div>
      <div class="fix-item" onclick="openMRSheet()">
        <div class="fix-icon purple">⎇</div>
        <div class="fix-text"><div class="ft-label">Merge Requests &amp; Issues</div><div class="ft-desc">View open MRs and issues</div></div>
      </div>
      <div class="fix-item" onclick="signOut()">
        <div class="fix-icon orange">⏏</div>
        <div class="fix-text"><div class="ft-label">Sign Out</div><div class="ft-desc">Clear token from memory</div></div>
      </div>
    </div>
  `);
}

// ══════════════════════════════════════════════════════
//  REPO BROWSER
// ══════════════════════════════════════════════════════
function openRepoBrowser() {
  if (!isAuthed()) { openAuthSheet(); return; }
  openSheet(`
    <div class="sheet-title">📂 Open Repository</div>
    <div class="sheet-subtitle">Your GitLab projects</div>
    <div class="sheet-sep"></div>
    <div class="repo-search"><input id="repoSearch" type="text" placeholder="Search repositories…" oninput="filterRepos(this.value)" autocorrect="off" spellcheck="false"/></div>
    <div class="sheet-scroll" id="repoList"><div class="loading-row"><span class="spinner"></span> Loading projects…</div></div>
  `);
  loadRepos();
}

let allRepos = [];
async function loadRepos() {
  try {
    const res = await api('/projects?membership=true&order_by=last_activity_at&per_page=30&simple=false');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allRepos = await res.json();
    renderRepos(allRepos);
  } catch (e) {
    document.getElementById('repoList').innerHTML = `<div class="repo-empty">Failed to load: ${e.message}</div>`;
  }
}

function renderRepos(repos) {
  const el = document.getElementById('repoList');
  if (!repos.length) { el.innerHTML = '<div class="repo-empty">No repositories found.</div>'; return; }
  el.innerHTML = repos.map(r => {
    const updated = r.last_activity_at ? timeSince(r.last_activity_at) : '';
    const vis = r.visibility === 'private' ? '🔒 private' : r.visibility === 'internal' ? '🏢 internal' : '🌐 public';
    return `<div class="repo-item" onclick="selectRepo(${r.id}, '${esc(r.name)}', '${esc(r.path_with_namespace)}', '${esc(r.default_branch || 'main')}')">
      <div class="repo-icon">${r.name.charAt(0).toUpperCase()}</div>
      <div class="repo-info">
        <div class="ri-name">${esc(r.name_with_namespace || r.name)}</div>
        <div class="ri-meta">
          <span class="vis">${vis}</span>
          ${r.language ? `<span class="lang">${esc(r.language)}</span>` : ''}
          ${updated ? `<span class="updated">${updated}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterRepos(q) {
  const filtered = q ? allRepos.filter(r =>
    r.name.toLowerCase().includes(q.toLowerCase()) ||
    (r.path_with_namespace || '').toLowerCase().includes(q.toLowerCase())
  ) : allRepos;
  renderRepos(filtered);
}

async function selectRepo(id, name, fullPath, defaultBranch) {
  session.currentRepo = { id, name, fullPath, defaultBranch };
  session.currentBranch = defaultBranch;
  document.getElementById('breadRepo').textContent = name;
  document.getElementById('statusBranch').textContent = `⎇ ${defaultBranch}`;
  const ref = document.getElementById('breadRef');
  ref.textContent = `⬡ ${fullPath}`;
  ref.style.display = 'block';
  openFileTree('');
}

// ══════════════════════════════════════════════════════
//  FILE TREE
// ══════════════════════════════════════════════════════
let treePath = '';

function openFileTree(path) {
  treePath = path;
  const crumbs = buildCrumbs(path);
  openSheet(`
    <div class="sheet-title">📁 ${esc(session.currentRepo.name)}</div>
    <div class="sheet-subtitle">Branch: <strong style="color:var(--accent2)">${esc(session.currentBranch)}</strong></div>
    <div class="tree-path-bar" id="treeCrumbs">${crumbs}</div>
    <div class="sheet-sep"></div>
    <div class="sheet-scroll" id="treeList"><div class="loading-row"><span class="spinner"></span></div></div>
  `);
  loadTree(path);
}

function buildCrumbs(path) {
  let parts = path ? path.split('/') : [];
  let html = `<span class="tree-crumb" onclick="openFileTree('')">root</span>`;
  let acc = '';
  parts.forEach((p, i) => {
    acc += (acc ? '/' : '') + p;
    const captured = acc;
    if (i < parts.length - 1) {
      html += ` › <span class="tree-crumb" onclick="openFileTree('${esc(captured)}')">${esc(p)}</span>`;
    } else {
      html += ` › <span class="tree-crumb">${esc(p)}</span>`;
    }
  });
  return html;
}

async function loadTree(path) {
  const { id, defaultBranch } = session.currentRepo;
  const branch = session.currentBranch || defaultBranch;
  const pathParam = path ? `&path=${encodeURIComponent(path)}` : '';
  try {
    const res = await api(`/projects/${id}/repository/tree?ref=${branch}&per_page=50${pathParam}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const items = await res.json();
    renderTree(items);
  } catch (e) {
    document.getElementById('treeList').innerHTML = `<div class="repo-empty">Error: ${e.message}</div>`;
  }
}

function renderTree(items) {
  // Dirs first, then files
  const sorted = [...items].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'tree' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  const el = document.getElementById('treeList');
  if (!sorted.length) { el.innerHTML = '<div class="repo-empty">Empty directory.</div>'; return; }
  el.innerHTML = sorted.map(item => {
    const isDir = item.type === 'tree';
    const icon = isDir ? '📁' : fileIcon(item.name);
    const action = isDir
      ? `openFileTree('${esc(item.path)}')`
      : `openFile('${esc(item.path)}', '${esc(item.id)}')`;
    return `<div class="tree-item ${isDir ? 'dir' : ''}" onclick="${action}">
      <div class="ti-icon">${icon}</div>
      <div class="ti-name">${esc(item.name)}</div>
      ${!isDir ? `<div class="ti-size">${item.id.slice(0,7)}</div>` : ''}
    </div>`;
  }).join('');
}

function fileIcon(name) {
  if (name.endsWith('.py')) return '🐍';
  if (name.endsWith('.md')) return '📝';
  if (name.endsWith('.toml') || name.endsWith('.cfg') || name.endsWith('.ini')) return '⚙️';
  if (name.endsWith('.lock')) return '🔒';
  if (name.endsWith('.json')) return '{}';
  if (name.endsWith('.yml') || name.endsWith('.yaml')) return '📋';
  if (name.endsWith('.sh')) return '💲';
  if (name.startsWith('.')) return '·';
  return '📄';
}

// ══════════════════════════════════════════════════════
//  OPEN FILE FROM GITLAB
// ══════════════════════════════════════════════════════
async function openFile(path, blobId) {
  const { id } = session.currentRepo;
  const branch = session.currentBranch;
  closeSheet();
  showToast(`Loading ${path.split('/').pop()}…`);

  try {
    const res = await api(`/projects/${id}/repository/files/${encodeURIComponent(path)}?ref=${branch}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const content = atob(data.content); // base64 decode
    session.currentFile = { path, content, sha: data.last_commit_id };
    document.getElementById('fileLabel').textContent = path.split('/').pop();
    document.getElementById('breadFile').textContent = path.split('/').pop();
    loadFileIntoEditor(content, path);
    showToast(`✓ Opened ${path.split('/').pop()}`);
  } catch (e) {
    showToast(`✕ ${e.message}`);
  }
}

function loadFileIntoEditor(content, path) {
  const isPython = path.endsWith('.py');
  const lines = content.split('\n');
  // Build simple highlighted lines (reuse demo data structure for Python, plain for others)
  const codeData = lines.map(line => ({ t: isPython ? highlightPython(line) : escHtml(line) }));
  // Replace global CODE and re-render
  window.DYNAMIC_CODE = codeData;
  renderCode(codeData);
}

// Very lightweight Python highlighter
function highlightPython(line) {
  let s = escHtml(line);
  // Comment
  if (/^\s*#/.test(line)) return `<span class="cm">${s}</span>`;
  // Docstring lines (simplified)
  if (/^\s*"""/.test(line) || /^\s*'''/.test(line)) return `<span class="st">${s}</span>`;
  // Keywords
  const kws = ['from','import','class','def','return','if','else','elif','for','while',
    'try','except','finally','raise','with','as','pass','break','continue','and','or','not','in','is','lambda','yield','async','await','True','False','None'];
  kws.forEach(kw => {
    s = s.replace(new RegExp(`\\b(${kw})\\b`, 'g'), `<span class="kw">$1</span>`);
  });
  // Strings (basic)
  s = s.replace(/(&#34;&#34;&#34;.*?&#34;&#34;&#34;|&#34;[^&#34;]*&#34;|&#39;[^&#39;]*&#39;)/g, '<span class="st">$1</span>');
  // Decorators
  s = s.replace(/(@\w+)/g, '<span class="dc">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="nu">$1</span>');
  return s;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&#34;').replace(/'/g,'&#39;');
}

// ══════════════════════════════════════════════════════
//  COMMIT SHEET
// ══════════════════════════════════════════════════════
function openCommitSheet() {
  if (!isAuthed()) { openAuthSheet(); return; }
  if (!session.currentFile) {
    showToast('No file open from GitLab');
    return;
  }
  const filename = session.currentFile.path.split('/').pop();
  openSheet(`
    <div class="sheet-title">↑ Commit &amp; Push</div>
    <div class="sheet-subtitle">${esc(session.currentFile.path)}</div>
    <div class="sheet-sep"></div>
    <div class="sheet-scroll">
      <div class="commit-diff" id="commitDiff">
        <div class="diff-meta">diff --git a/${esc(session.currentFile.path)}</div>
        <div class="diff-add">+ (current editor content)</div>
        <div class="diff-meta">— staged for commit</div>
      </div>
      <div class="commit-msg-wrap">
        <label>Commit Message</label>
        <textarea class="commit-msg" id="commitMsg" placeholder="feat: update ${esc(filename)}"></textarea>
      </div>
      <div class="commit-branch-row">
        Pushing to <strong>${esc(session.currentBranch || session.currentRepo?.defaultBranch || 'main')}</strong>
        &nbsp;·&nbsp; authored as <strong style="color:var(--accent)">${esc(session.username)}</strong>
      </div>
      <div class="auth-error" id="commitError"></div>
      <button class="commit-btn" id="commitBtn" onclick="submitCommit()">Commit &amp; Push</button>
      <div style="height:8px"></div>
    </div>
  `);
}

async function submitCommit() {
  const msg = document.getElementById('commitMsg').value.trim();
  const err = document.getElementById('commitError');
  err.classList.remove('show');
  if (!msg) { err.textContent = 'Commit message is required.'; err.classList.add('show'); return; }

  const btn = document.getElementById('commitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { id } = session.currentRepo;
  const branch = session.currentBranch;
  const filePath = session.currentFile.path;
  // Get current editor content (use demo CODE for now since we can't exec)
  const content = session.currentFile.content;
  const encoded = btoa(unescape(encodeURIComponent(content)));

  try {
    const res = await api(`/projects/${id}/repository/files/${encodeURIComponent(filePath)}`, {
      method: 'PUT',
      body: JSON.stringify({
        branch,
        content: encoded,
        encoding: 'base64',
        commit_message: msg,
        author_name: session.username,
        author_email: session.email,
      }),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.message || `HTTP ${res.status}`);
    }
    document.getElementById('fileDot').style.background = 'var(--green)';
    closeSheet();
    showToast(`✓ Committed: "${msg.slice(0, 40)}"`);
  } catch (e) {
    err.textContent = e.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = 'Commit &amp; Push';
  }
}

// ══════════════════════════════════════════════════════
//  MR / ISSUES SHEET
// ══════════════════════════════════════════════════════
let mrTab = 'mr';
function openMRSheet() {
  if (!isAuthed()) { openAuthSheet(); return; }
  if (!session.currentRepo) { showToast('Open a repo first'); return; }
  openSheet(`
    <div class="sheet-title">⎇ MR &amp; Issues</div>
    <div class="sheet-subtitle">${esc(session.currentRepo.name)}</div>
    <div class="mr-tabs" id="mrTabs">
      <div class="mr-tab active" onclick="switchMRTab('mr', this)">Merge Requests</div>
      <div class="mr-tab" onclick="switchMRTab('issues', this)">Issues</div>
    </div>
    <div class="sheet-scroll" id="mrList"><div class="loading-row"><span class="spinner"></span></div></div>
  `);
  loadMRs();
}

function switchMRTab(tab, el) {
  mrTab = tab;
  document.querySelectorAll('.mr-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mrList').innerHTML = '<div class="loading-row"><span class="spinner"></span></div>';
  tab === 'mr' ? loadMRs() : loadIssues();
}

async function loadMRs() {
  const { id } = session.currentRepo;
  try {
    const res = await api(`/projects/${id}/merge_requests?state=opened&per_page=20`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const mrs = await res.json();
    renderMRs(mrs);
  } catch (e) {
    document.getElementById('mrList').innerHTML = `<div class="repo-empty">Error: ${e.message}</div>`;
  }
}

function renderMRs(mrs) {
  const el = document.getElementById('mrList');
  if (!mrs.length) { el.innerHTML = '<div class="repo-empty">No open merge requests.</div>'; return; }
  el.innerHTML = mrs.map(mr => `
    <div class="mr-item">
      <div class="mi-top">
        <div class="mi-title">!${mr.iid} ${esc(mr.title)}</div>
        <span class="mr-badge ${mr.state}">${mr.state}</span>
      </div>
      <div class="mi-meta">
        <span class="mi-branch">${esc(mr.source_branch)} → ${esc(mr.target_branch)}</span>
        <span>by @${esc(mr.author?.username || '?')}</span>
        <span>${timeSince(mr.created_at)}</span>
      </div>
    </div>`).join('');
}

async function loadIssues() {
  const { id } = session.currentRepo;
  try {
    const res = await api(`/projects/${id}/issues?state=opened&per_page=20`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const issues = await res.json();
    renderIssues(issues);
  } catch (e) {
    document.getElementById('mrList').innerHTML = `<div class="repo-empty">Error: ${e.message}</div>`;
  }
}

function renderIssues(issues) {
  const el = document.getElementById('mrList');
  if (!issues.length) { el.innerHTML = '<div class="repo-empty">No open issues.</div>'; return; }
  el.innerHTML = issues.map(i => `
    <div class="mr-item">
      <div class="mi-top">
        <div class="mi-title">#${i.iid} ${esc(i.title)}</div>
        <span class="mr-badge issue">${i.state}</span>
      </div>
      <div class="mi-meta">
        <span>by @${esc(i.author?.username || '?')}</span>
        ${i.assignee ? `<span>→ @${esc(i.assignee.username)}</span>` : ''}
        <span>${timeSince(i.created_at)}</span>
        ${i.labels?.length ? `<span style="color:var(--accent2)">${i.labels.slice(0,2).join(', ')}</span>` : ''}
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════
//  QUICK FIX SHEET
// ══════════════════════════════════════════════════════
function showDiagSheet(ln) {
  const line = (window.DYNAMIC_CODE || CODE)[ln - 1];
  if (!line || (!line.error && !line.warn && !line.info)) { showFixSheet(); return; }
  const title = line.error ? '✕ Error' : line.warn ? '⚠ Warning' : 'ℹ Hint';
  openSheet(`
    <div class="sheet-title">${title}</div>
    <div class="sheet-subtitle">${esc(line.rule || '')}: ${esc(line.msg || '')}</div>
    <div class="sheet-sep"></div>
    <div class="sheet-scroll">${fixItems()}</div>
  `);
}

function showFixSheet() {
  openSheet(`
    <div class="sheet-title">⚡ Fix All</div>
    <div class="sheet-subtitle">5 issues found · 4 auto-fixable</div>
    <div class="sheet-sep"></div>
    <div class="sheet-scroll">${fixItems()}</div>
  `);
}

function fixItems() {
  return `
    <div class="fix-item" onclick="applyFix('ruff-fix')"><div class="fix-icon orange">✦</div><div class="fix-text"><div class="ft-label">Ruff: Fix All Auto-fixable</div><div class="ft-desc">Apply all safe ruff --fix suggestions</div></div></div>
    <div class="fix-item" onclick="applyFix('add-docstring')"><div class="fix-icon purple">"""</div><div class="fix-text"><div class="ft-label">Add Missing Docstrings</div><div class="ft-desc">Generate Google-style docstrings</div></div></div>
    <div class="fix-item" onclick="applyFix('add-types')"><div class="fix-icon blue">→</div><div class="fix-text"><div class="ft-label">Add Type Annotations</div><div class="ft-desc">Infer and insert missing return/arg types</div></div></div>
    <div class="fix-item" onclick="applyFix('unused-imports')"><div class="fix-icon green">⊘</div><div class="fix-text"><div class="ft-label">Remove Unused Imports</div><div class="ft-desc">Clean F401 violations automatically</div></div></div>
  `;
}

function applyFix(type) {
  closeSheet();
  const msgs = { 'ruff-fix':'✦ Ruff applied 3 fixes','add-docstring':'""" Docstrings generated',
    'add-types':'→ Types inserted','unused-imports':'⊘ Removed unused imports' };
  showToast(msgs[type] || 'Fix applied');
  document.getElementById('fileDot').style.background = 'var(--yellow)';
}

// ══════════════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════════════
let activeLine = 8;
let problemsOpen = false;
let sidebarOpen = false;
const hoverTip = document.getElementById('hoverTip');

function renderCode(data) {
  const src = data || CODE;
  const gutter = document.getElementById('gutter');
  const lines = document.getElementById('codeLines');
  gutter.innerHTML = ''; lines.innerHTML = '';
  src.forEach((line, i) => {
    const ln = i + 1;
    const gl = document.createElement('div');
    gl.className = 'gutter-line' + (line.error?' has-error':line.warn?' has-warning':line.info?' has-info':'');
    gl.innerHTML = `<div class="bp" id="bp${ln}"></div><span>${ln}</span>`;
    gl.addEventListener('click', () => { activeLine=ln; highlightLine(); showDiagSheet(ln); });
    gutter.appendChild(gl);

    const cl = document.createElement('div');
    let cls = 'code-line';
    if (ln===activeLine) cls+=' active-line';
    if (line.error) cls+=' error-line';
    else if (line.warn) cls+=' warning-line';
    else if (line.info) cls+=' info-line';
    cl.className=cls; cl.id=`cl${ln}`;
    let content = line.t;
    if (i===8) content+=`<span class="cursor"></span>`;
    let diag='';
    if (line.error) diag=`<span class="inline-diag error" onclick="showDiagSheet(${ln})"><span class="src">[${line.src||''}]</span> ${line.rule||''}: ${line.msg||''}</span>`;
    else if (line.warn) diag=`<span class="inline-diag warn" onclick="showDiagSheet(${ln})"><span class="src">[${line.src||''}]</span> ${line.rule||''}: ${line.msg||''}</span>`;
    else if (line.info) diag=`<span class="inline-diag info" onclick="showDiagSheet(${ln})"><span class="src">[${line.src||''}]</span> ${line.rule||''}: ${line.msg||''}</span>`;
    cl.innerHTML=content+diag;
    cl.addEventListener('click', ()=>{ activeLine=ln; highlightLine(); });
    cl.addEventListener('touchstart', (e)=>handleHover(e,line.t,ln),{passive:true});
    lines.appendChild(cl);
  });
}

function highlightLine() {
  document.querySelectorAll('.code-line').forEach((el,i)=>{
    el.classList.toggle('active-line',i+1===activeLine);
  });
}

function handleHover(e,html,ln) {
  const key = Object.keys(HOVER_DATA).find(k=>html.includes(`>${k}<`)||html.includes(`">${k}`));
  if (!key) return;
  const d = HOVER_DATA[key];
  document.getElementById('htSig').textContent=d.sig;
  document.getElementById('htDoc').textContent=d.doc;
  document.getElementById('htType').textContent=d.type;
  hoverTip.querySelector('.ht-kind').textContent=d.kind;
  const t=e.touches[0];
  hoverTip.style.left=Math.min(t.clientX,window.innerWidth-300)+'px';
  hoverTip.style.top=Math.max(t.clientY-130,80)+'px';
  hoverTip.classList.add('visible');
  setTimeout(()=>hoverTip.classList.remove('visible'),2800);
}

function renderProblems() {
  const list=document.getElementById('problemsList'); list.innerHTML='';
  PROBLEMS.forEach(p=>{
    const item=document.createElement('div'); item.className='problem-item';
    const icon=p.type==='e'?'✕':p.type==='w'?'⚠':'ℹ';
    item.innerHTML=`<div class="problem-icon ${p.type}">${icon}</div>
      <div class="problem-content">
        <div class="problem-msg">${p.msg}</div>
        <div class="problem-meta"><span class="rule">${p.rule}</span><span>Ln ${p.line}, Col ${p.col}</span><span>${p.src}</span></div>
      </div>`;
    item.addEventListener('click',()=>{ activeLine=p.line; highlightLine(); scrollToLine(p.line); showDiagSheet(p.line); });
    list.appendChild(item);
  });
}

function scrollToLine(ln) {
  const el=document.getElementById(`cl${ln}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleProblems() {
  problemsOpen=!problemsOpen;
  document.getElementById('problemsPanel').classList.toggle('open',problemsOpen);
  document.getElementById('problemsToggle').classList.toggle('active',problemsOpen);
}

document.getElementById('sidebarToggle').addEventListener('click',()=>{
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open',sidebarOpen);
  document.getElementById('sidebarToggle').classList.toggle('active',sidebarOpen);
});
document.getElementById('problemsToggle').addEventListener('click',toggleProblems);
document.getElementById('lintBtn').addEventListener('click',()=>{
  const btn=document.getElementById('lintBtn');
  btn.style.color='var(--yellow)'; btn.textContent='↻';
  setTimeout(()=>{ btn.style.color='var(--green)'; btn.textContent='✓';
    setTimeout(()=>{ btn.style.color=''; btn.textContent='✦'; },1200); },700);
});

function insertSnippet(key) { showToast('📋 Snippet: '+key); }

// ══════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════
function showToast(msg) {
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
    background:var(--bg3);border:1px solid var(--bg4);color:var(--fg-bright);
    padding:8px 16px;border-radius:8px;font-size:12px;z-index:300;
    white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;
    animation:fadeInUp .15s ease`;
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&#34;'); }

function timeSince(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60)+'m ago';
  if (s < 86400) return Math.floor(s/3600)+'h ago';
  if (s < 2592000) return Math.floor(s/86400)+'d ago';
  return Math.floor(s/2592000)+'mo ago';
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
renderCode();
renderProblems();
scrollToLine(8);

// Show GitLab dot hint on first load (not authed)
document.getElementById('glDot').style.display = 'block';
